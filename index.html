<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Route Reports</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .controls { margin-bottom: 20px; }
        select { padding: 8px; font-size: 16px; }
        
        /* Make the iframe large enough to read easily */
        iframe { 
            width: 100%; 
            height: 80vh; 
            border: 1px solid #ccc; 
            border-radius: 4px;
        }
    </style>
</head>
<body>

    {% if site.posts and site.posts.size > 0 %}
    <div class="controls">
        <label for="history">Select a report date: </label>
        
        <select id="history" onchange="document.getElementById('display-frame').src = this.value;">
            <option value="{{ site.baseurl }}{{ site.posts.first.url }}">
                Latest Report ({{ site.posts.first.date | date: "%B %d, %Y" }})
            </option>
            
            {% for post in site.posts offset:1 %}
                <option value="{{ site.baseurl }}{{ post.url }}">
                    {{ post.date | date: "%B %d, %Y" }}
                </option>
            {% endfor %}
        </select>
    </div>

    <iframe id="display-frame" src="{{ site.baseurl }}{{ site.posts.first.url }}"></iframe>
    {% else %}
      <p>No reports found in <code>_posts</code>.</p>
    {% endif %}

</body>
</html>
